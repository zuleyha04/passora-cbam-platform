[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Supabase server-side keys — set these in Netlify Dashboard → Environment Variables
# SUPABASE_URL = https://xxxx.supabase.co
# SUPABASE_SERVICE_KEY = eyJhbGci...  (NOT the anon key — this is the secret service role key)

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
