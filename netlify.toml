[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION  = "20"
  NPM_FLAGS     = "--legacy-peer-deps"

# Supabase client keys — set these in Netlify Dashboard → Environment Variables
# VITE_SUPABASE_URL      = https://xxxx.supabase.co
# VITE_SUPABASE_ANON_KEY = eyJhbGci...  (public anon key)
# SUPABASE_URL           = https://xxxx.supabase.co
# SUPABASE_SERVICE_KEY   = eyJhbGci...  (secret service role key — NOT the anon key)

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
